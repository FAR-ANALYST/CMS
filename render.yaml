services:
  - type: web
    name: getmycoach
    env: python
    plan: free
    buildCommand: "pip install -r requirements.txt"
    startCommand: "gunicorn app:app --bind 0.0.0.0:$PORT --workers 2 --timeout 120"
    envVars:
      - key: FLASK_SECRET
        generateValue: true
      - key: ADMIN_EMAIL
        value: admin@getmycoach.ug
      - key: ADMIN_PASSWORD
        value: FAROUK
      - key: RENDER
        value: "true"
      - key: PYTHON_VERSION
        value: "3.11.9"
