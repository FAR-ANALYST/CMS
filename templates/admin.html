<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <style>body { background-color: #0D0D0D; color: white; }</style>
</head>
<body class="p-8">
    <div class="max-w-4xl mx-auto">
        <nav class="flex justify-between items-center mb-10 pb-6 border-b border-neutral-800">
            <h1 class="text-2xl font-black italic uppercase tracking-tighter">Get My <span class="text-yellow-500">Coach</span></h1>
            <div class="flex items-center gap-6">
                <a href="/student" class="text-[10px] font-black uppercase text-neutral-400 hover:text-white">Directory</a>
                <a href="/admin" class="text-[10px] font-black uppercase text-yellow-500 border-b-2 border-yellow-500 pb-1">Admin Control</a>
                <a href="/logout" class="text-[10px] font-black uppercase text-red-500 hover:text-red-400">Logout</a>
            </div>
        </nav>

        <h1 class="text-3xl font-black italic uppercase mb-10">Verification <span class="text-yellow-500">Desk</span></h1>

        <div class="space-y-4">
            {% for coach in pending %}
            <div class="bg-[#1A1A1A] p-6 rounded-[2.5rem] border border-neutral-800 flex items-center justify-between shadow-xl">
                <div class="flex items-center gap-5">
                    <img src="{{ coach.profile_pic_url }}" class="w-20 h-20 rounded-2xl object-cover border border-neutral-800">
                    <div>
                        <h3 class="font-black uppercase italic">{{ coach.full_name }}</h3>
                        <p class="text-neutral-500 text-[10px] font-bold uppercase tracking-widest mt-1">{{ coach.sport_category }} • {{ coach.location_district }}</p>
                        <p class="text-neutral-600 text-[10px] mt-1">{{ coach.contact_number }}</p>
                    </div>
                </div>
                <div class="flex flex-col items-end gap-3">
                    <span class="text-red-500 text-[9px] font-black uppercase tracking-tighter bg-red-500/10 px-2 py-1 rounded-md">Pending Payment</span>
                    <a href="/admin/mark_paid/{{ coach.id }}" class="bg-green-600 text-white px-8 py-3 rounded-2xl font-black text-[10px] uppercase tracking-widest hover:bg-green-500 transition shadow-lg shadow-green-900/20">Mark as Paid</a>
                </div>
            </div>
            {% else %}
            <div class="text-center py-20 bg-neutral-900/20 rounded-[3rem] border border-dashed border-neutral-800">
                <p class="text-neutral-600 italic font-bold uppercase text-xs tracking-[0.2em]">No coaches currently awaiting payment.</p>
            </div>
            {% endfor %}
        </div>
    </div>
    <script>lucide.createIcons();</script>
</body>
</html>
