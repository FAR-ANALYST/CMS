<!DOCTYPE html>
<html lang="en">
<head>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body { background-color: #0D0D0D; color: white; }
        .gold-text { color: #EAB308; }
        .gold-bg { background-color: #EAB308; }
        .card { background-color: #1A1A1A; border: 1px solid #333; }
    </style>
</head>
<body class="p-8">
    <div class="flex justify-between items-center mb-10">
        <h1 class="text-3xl font-bold gold-text">ADMINISTRATION FACE</h1>
        <a href="/student" class="border border-gray-600 px-4 py-2 rounded text-sm hover:bg-gray-800">Switch to Student Face</a>
    </div>

    <div class="grid grid-cols-1 md:grid-cols-2 gap-8">
        <div class="card p-6 rounded-lg">
            <h2 class="text-xl font-bold mb-4">Generate Coach Access Code</h2>
            <form action="/admin/generate-code" method="POST" class="space-y-4">
                <div>
                    <label class="block text-sm text-gray-400">Sport Abbreviation (3 Letters)</label>
                    <input type="text" name="sport_abbr" maxlength="3" placeholder="e.g. CHE, FOT, BOX" 
                           class="w-full bg-black border border-gray-700 p-3 rounded mt-1 uppercase text-yellow-500 font-mono">
                </div>
                <button type="submit" class="w-full gold-bg text-black font-bold py-3 rounded">GENERATE & SAVE</button>
            </form>
        </div>

        <div class="card p-6 rounded-lg">
            <h2 class="text-xl font-bold mb-4">Unused Coach Codes</h2>
            <div class="overflow-y-auto max-h-64">
                <table class="w-full text-left">
                    <thead class="text-gray-500 text-sm border-b border-gray-800">
                        <tr>
                            <th class="pb-2">Code</th>
                            <th class="pb-2">Sport</th>
                            <th class="pb-2">Status</th>
                        </tr>
                    </thead>
                    <tbody class="text-sm">
                        {% for code in codes %}
                        <tr class="border-b border-gray-800">
                            <td class="py-3 font-mono text-yellow-500">{{ code.code }}</td>
                            <td class="py-3">{{ code.sport_abbreviation }}</td>
                            <td class="py-3 text-green-500">Available</td>
                        </tr>
                        {% endfor %}
                    </tbody>
                </table>
            </div>
        </div>
    </div>
</body>
</html>
