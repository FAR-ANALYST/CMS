<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <style>body { background-color: #0D0D0D; color: white; }</style>
</head>
<body class="p-8">
    <div class="max-w-4xl mx-auto space-y-10">
        <div class="flex justify-between items-center">
            <h1 class="text-3xl font-black italic uppercase">Admin <span class="text-yellow-500">Control</span></h1>
            <a href="/student" class="text-xs font-bold text-neutral-500 uppercase">Exit</a>
        </div>

        <div class="space-y-4">
            <h2 class="text-sm font-black uppercase text-yellow-500 tracking-widest">Pending Submissions</h2>
            {% if not pending %}
                <p class="text-neutral-600 text-xs italic">No new submissions to review.</p>
            {% endif %}
            {% for coach in pending %}
            <div class="bg-[#1A1A1A] p-6 rounded-[2rem] border border-neutral-800 flex items-center justify-between shadow-xl">
                <div class="flex items-center gap-4">
                    <img src="{{ coach.profile_pic_url }}" class="w-16 h-16 rounded-2xl object-cover border border-neutral-800">
                    <div>
                        <h3 class="font-bold text-lg leading-tight">{{ coach.full_name }}</h3>
                        <p class="text-yellow-500 text-[10px] font-black uppercase tracking-widest">{{ coach.sport_category }}</p>
                        <p class="text-neutral-500 text-[10px] uppercase font-bold">{{ coach.contact_number }}</p>
                    </div>
                </div>
                <a href="/admin/verify/{{ coach.id }}" class="bg-green-600 text-white px-8 py-3 rounded-2xl font-black text-[10px] uppercase tracking-widest hover:bg-green-500 transition shadow-lg shadow-green-600/20">Verify Profile</a>
            </div>
            {% endfor %}
        </div>
    </div>
    <script>lucide.createIcons();</script>
</body>
</html>
