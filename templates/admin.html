<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <style>body { background-color: #0D0D0D; color: white; }</style>
</head>
<body class="p-8">
    <div class="max-w-4xl mx-auto space-y-10">
        <h1 class="text-3xl font-black italic uppercase">Admin <span class="text-yellow-500">Verify</span></h1>

        <div class="space-y-4">
            {% for coach in pending %}
            <div class="bg-[#1A1A1A] p-6 rounded-[2.5rem] border border-neutral-800 flex items-center justify-between">
                <div class="flex items-center gap-4">
                    <img src="{{ coach.profile_pic_url }}" class="w-16 h-16 rounded-2xl object-cover border border-neutral-800">
                    <div>
                        <h3 class="font-bold">{{ coach.full_name }}</h3>
                        <p class="text-neutral-500 text-[10px] uppercase">{{ coach.sport_category }} | {{ coach.location_district }}</p>
                    </div>
                </div>
                <div class="flex flex-col items-end gap-3">
                    <span class="text-red-500 text-[10px] font-black uppercase tracking-widest">Unpaid Submission</span>
                    <a href="/admin/mark_paid/{{ coach.id }}" class="bg-green-600 text-white px-8 py-3 rounded-2xl font-black text-[10px] uppercase tracking-widest hover:bg-green-500 transition">Mark as Paid & Verify</a>
                </div>
            </div>
            {% else %}
            <p class="text-neutral-600 italic text-center">No pending payments.</p>
            {% endfor %}
        </div>
    </div>
    <script>lucide.createIcons();</script>
</body>
</html>
