<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %}Get My Coach Uganda{% endblock %}</title>
    <style>
        :root { --bg: #0a0a0a; --panel: #141414; --gold: #d4af37; --red: #b91c1c; --text: #f0f0f0; }
        body { background: var(--bg); color: var(--text); font-family: 'Inter', sans-serif; margin: 0; padding: 20px; }
        h1, h2, h3 { color: var(--gold); text-transform: uppercase; }
        .btn-primary { background: var(--gold); color: black; border: none; padding: 12px 24px; border-radius: 6px; font-weight: 800; cursor: pointer; text-decoration: none; display: inline-block; }
        .panel, .card { background: var(--panel); border: 1px solid #222; padding: 20px; border-radius: 12px; }
        .avatar { width: 100%; height: 220px; object-fit: cover; border-radius: 8px; cursor: zoom-in; }
        nav { display: flex; align-items: center; gap: 20px; margin-bottom: 30px; border-bottom: 1px solid #333; padding-bottom: 15px; }
        nav a { color: white; text-decoration: none; font-weight: bold; }
        nav a:hover { color: var(--gold); }
        input, select, textarea { width: 100%; padding: 12px; background: #1f1f1f; border: 1px solid #333; color: white; border-radius: 8px; margin: 10px 0; box-sizing: border-box; }
        
        #lightbox { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.9); z-index: 9999; justify-content: center; align-items: center; }
        #lightbox img { max-width: 90%; max-height: 90%; border: 2px solid var(--gold); }
    </style>
</head>
<body>
    <nav>
        <span style="color: var(--gold); font-weight: 900; font-size: 1.2rem;">Get My Coach</span>
        <a href="{{ url_for('index') }}">Home</a>
        <a href="{{ url_for('coach_dashboard') }}">My Profile</a>
        {% if session.get('is_admin') %}<a href="{{ url_for('admin') }}" style="color: var(--gold);">ADMIN</a>{% endif %}
        <a href="{{ url_for('logout') }}" style="color: var(--red); margin-left: auto;">Logout</a>
    </nav>

    {% block content %}{% endblock %}

    <div id="lightbox" onclick="this.style.display='none'"><img src=""></div>
    <script>
        document.querySelectorAll('.avatar').forEach(img => {
            img.onclick = function() {
                document.querySelector('#lightbox img').src = this.src;
                document.getElementById('lightbox').style.display = 'flex';
            }
        });
    </script>
</body>
</html>
