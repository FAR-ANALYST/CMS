<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %}GMC Uganda{% endblock %}</title>
    <style>
        :root { --bg: #0a0a0a; --panel: #141414; --gold: #d4af37; --red: #b91c1c; --text: #f0f0f0; }
        body { background: var(--bg); color: var(--text); font-family: 'Inter', sans-serif; margin: 0; padding: 20px; }
        h1, h2, h3 { color: var(--gold); text-transform: uppercase; letter-spacing: 1px; }
        .btn-primary { background: var(--gold); color: black; border: none; padding: 12px 24px; border-radius: 6px; font-weight: 800; cursor: pointer; text-decoration: none; display: inline-block; }
        .panel, .card { background: var(--panel); border: 1px solid #222; padding: 25px; border-radius: 15px; box-shadow: 0 10px 30px rgba(0,0,0,0.5); margin-bottom: 25px; }
        .avatar { width: 100%; height: 250px; object-fit: cover; border-radius: 10px; cursor: zoom-in; transition: transform 0.3s ease; }
        .avatar:hover { transform: scale(1.02); border: 1px solid var(--gold); }
        
        /* Lightbox Magnifier */
        #lightbox { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.95); z-index: 9999; justify-content: center; align-items: center; }
        #lightbox img { max-width: 90%; max-height: 90%; border: 3px solid var(--gold); border-radius: 5px; }
        
        nav { display: flex; align-items: center; gap: 20px; padding-bottom: 20px; border-bottom: 1px solid #333; margin-bottom: 30px; }
        nav a { color: var(--text); text-decoration: none; font-weight: bold; font-size: 0.9rem; }
        nav a:hover { color: var(--gold); }
        input, select, textarea { width: 100%; padding: 12px; background: #1f1f1f; border: 1px solid #333; color: white; border-radius: 8px; margin: 10px 0; box-sizing: border-box; }
    </style>
</head>
<body>
    <nav>
        <span style="color: var(--gold); font-size: 1.2rem; font-weight: 900;">🏆 GMC UGANDA</span>
        <a href="{{ url_for('index') }}">Student Portal</a>
        {% if session.get('is_admin') %}
            <a href="{{ url_for('admin') }}" style="color: var(--gold);">Admin Dashboard</a>
        {% endif %}
        <a href="{{ url_for('coach_dashboard') }}">Coach Access</a>
        <a href="{{ url_for('logout') }}" style="color: var(--red); margin-left: auto;">Logout</a>
    </nav>

    {% block content %}{% endblock %}

    <div id="lightbox" onclick="this.style.display='none'"><img src=""></div>
    <script>
        document.querySelectorAll('.avatar').forEach(img => {
            img.onclick = function(e) {
                e.stopPropagation();
                document.querySelector('#lightbox img').src = this.src;
                document.getElementById('lightbox').style.display = 'flex';
            }
        });
    </script>
</body>
</html>
