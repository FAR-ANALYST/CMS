<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Welcome — Get My Coach Uganda</title>
    <style>
        body { 
            background: #0a0a0a; 
            color: #d4af37; 
            display: flex; 
            justify-content: center; 
            align-items: center; 
            height: 100vh; 
            font-family: 'Georgia', serif; 
            margin: 0;
        }
        .container { 
            text-align: center; 
            background: #141414; 
            padding: 60px; 
            border: 1px solid #d4af37; 
            border-radius: 20px; 
            box-shadow: 0 0 50px rgba(185, 28, 28, 0.2); 
        }
        h1 { font-size: 3rem; margin-bottom: 10px; text-shadow: 2px 2px #000; }
        p { color: #ffffff; margin-bottom: 40px; font-style: italic; }
        .btn { 
            display: block; 
            width: 280px; 
            padding: 15px; 
            margin: 15px auto; 
            text-decoration: none; 
            font-weight: bold; 
            border-radius: 5px; 
            transition: 0.3s;
        }
        .btn-coach { background: #d4af37; color: #000; }
        .btn-student { border: 1px solid #d4af37; color: #d4af37; }
        .btn:hover { transform: scale(1.05); box-shadow: 0 0 15px #b91c1c; }
    </style>
</head>
<body>
    <div class="container">
        <h1>🏆 GET MY COACH</h1>
        <p>Expert training for Uganda's next champions.</p>
        
        <a href="{{ url_for('login') }}" class="btn btn-coach">LOGIN AS COACH</a>
        <a href="{{ url_for('login') }}" class="btn btn-student">SEARCH AS STUDENT</a>
        
        <div style="margin-top: 30px; font-size: 0.8rem;">
            New coach? <a href="{{ url_for('signup') }}" style="color: #b91c1c; text-decoration: none;">Create Account</a>
        </div>
    </div>
</body>
</html>
