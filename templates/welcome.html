<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Welcome — Get My Coach Uganda</title>
    <style>
        /* Luxury Dark/Gold/Red Theme */
        :root {
            --bg: #0a0a0a;
            --gold: #d4af37;
            --red: #b91c1c;
            --white: #ffffff;
            --panel: #141414;
        }

        body {
            background-color: var(--bg);
            color: var(--white);
            margin: 0;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            font-family: 'Georgia', serif;
            overflow: hidden;
        }

        .welcome-card {
            background: var(--panel);
            padding: 60px 40px;
            border: 1px solid var(--gold);
            border-radius: 20px;
            text-align: center;
            box-shadow: 0 0 50px rgba(185, 28, 28, 0.2);
            max-width: 450px;
            width: 90%;
        }

        h1 {
            color: var(--gold);
            font-size: 2.8rem;
            margin-bottom: 10px;
            letter-spacing: 2px;
            text-transform: uppercase;
        }

        p.tagline {
            font-style: italic;
            color: #888;
            margin-bottom: 40px;
        }

        .btn-group {
            display: flex;
            flex-direction: column;
            gap: 15px;
        }

        .btn {
            padding: 16px;
            text-decoration: none;
            font-weight: bold;
            font-size: 1rem;
            border-radius: 8px;
            transition: all 0.3s ease;
            text-transform: uppercase;
            letter-spacing: 1px;
        }

        /* Gold Button */
        .btn-coach {
            background-color: var(--gold);
            color: #000;
        }

        .btn-coach:hover {
            background-color: #f1c40f;
            transform: translateY(-3px);
            box-shadow: 0 5px 15px rgba(212, 175, 55, 0.4);
        }

        /* Outline Button */
        .btn-student {
            background: transparent;
            border: 1px solid var(--gold);
            color: var(--gold);
        }

        .btn-student:hover {
            background: rgba(212, 175, 55, 0.1);
            transform: translateY(-3px);
        }

        .footer-links {
            margin-top: 30px;
            font-size: 0.9rem;
            color: #666;
        }

        .footer-links a {
            color: var(--red);
            text-decoration: none;
            font-weight: bold;
        }

        .footer-links a:hover {
            text-decoration: underline;
        }

        /* Farouk's signature badge */
        .admin-note {
            margin-top: 40px;
            font-size: 0.6rem;
            color: #333;
            text-transform: uppercase;
        }
    </style>
</head>
<body>

    <div class="welcome-card">
        <h1>🏆 Get My Coach</h1>
        <p class="tagline">Expert Training. Elite Results.</p>

        <div class="btn-group">
            <a href="{{ url_for('login') }}" class="btn btn-coach">Login as Coach</a>
            <a href="{{ url_for('login') }}" class="btn btn-student">Search as Student</a>
        </div>

        <div class="footer-links">
            Don't have a coach account? <br>
            <a href="{{ url_for('signup') }}">Create your profile here</a>
        </div>

        <div class="admin-note">
            Powered by FAROUK Systems &copy; 2026
        </div>
    </div>

</body>
</html>
