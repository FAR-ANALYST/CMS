{% extends "base.html" %}
{% block title %}Login — Get My Coach Uganda{% endblock %}
{% block content %}
<div class="auth-wrap">
  <div class="auth-card">
    <div class="auth-tabs">
      <button class="tab {% if not show_register %}active{% endif %}" onclick="showTab('login')" id="tab-login">Log in</button>
      <button class="tab {% if show_register %}active{% endif %}" onclick="showTab('register')" id="tab-register">Sign up</button>
    </div>

    <form method="POST" action="{{ url_for('login') }}" id="form-login" class="auth-form" {% if show_register %}style="display:none"{% endif %}>
      <h2>Welcome back</h2>
      <label>Username or Email</label>
      <input type="text" name="login_id" required autocomplete="username" placeholder="FAROUK or you@email.com">
      <label>Password</label>
      <input type="password" name="password" required autocomplete="current-password" placeholder="••••••••">
      <button type="submit" class="btn btn-gold btn-block">Log in</button>
      <p class="hint">Admin login: <strong>FAROUK / FAROUK</strong></p>
    </form>

    <form method="POST" action="{{ url_for('register') }}" id="form-register" class="auth-form" {% if not show_register %}style="display:none"{% endif %}>
      <h2>Create coach account</h2>
      <label>Username</label>
      <input type="text" name="username" required placeholder="coachjohn">
      <label>Email</label>
      <input type="email" name="email" required placeholder="you@email.com">
      <label>Password</label>
      <input type="password" name="password" required minlength="6" placeholder="At least 6 characters">
      <button type="submit" class="btn btn-gold btn-block">Sign up</button>
      <p class="hint">After signing up, complete your profile and submit it for admin verification.</p>
    </form>
  </div>
</div>

<script>
function showTab(which) {
  document.getElementById('form-login').style.display = which === 'login' ? 'block' : 'none';
  document.getElementById('form-register').style.display = which === 'register' ? 'block' : 'none';
  document.getElementById('tab-login').classList.toggle('active', which === 'login');
  document.getElementById('tab-register').classList.toggle('active', which === 'register');
}
</script>
{% endblock %}
