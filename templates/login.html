<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Login — Get My Coach Uganda</title>
  <style>
    *{box-sizing:border-box;margin:0;padding:0;font-family:system-ui,-apple-system,sans-serif}
    body{min-height:100vh;display:flex;align-items:center;justify-content:center;
         background:linear-gradient(135deg,#1e3a8a 0%,#0f766e 100%);padding:1rem}
    .card{background:#fff;border-radius:16px;padding:2rem;width:100%;max-width:400px;
          box-shadow:0 20px 50px rgba(0,0,0,.3)}
    h1{color:#1e3a8a;margin-bottom:.25rem;font-size:1.5rem}
    p.sub{color:#64748b;margin-bottom:1.5rem;font-size:.875rem}
    label{display:block;font-weight:600;color:#334155;margin-bottom:.5rem;font-size:.875rem}
    input{width:100%;padding:.75rem;border:2px solid #e2e8f0;border-radius:8px;
          font-size:1rem;margin-bottom:1rem;transition:border-color .2s}
    input:focus{outline:none;border-color:#0f766e}
    button{width:100%;padding:.875rem;background:#0f766e;color:#fff;border:none;
           border-radius:8px;font-size:1rem;font-weight:600;cursor:pointer;transition:background .2s}
    button:hover{background:#0d6660}
    .alert{padding:.75rem;border-radius:8px;margin-bottom:1rem;font-size:.875rem}
    .alert-danger{background:#fef2f2;color:#991b1b;border:1px solid #fecaca}
    .alert-success{background:#f0fdf4;color:#166534;border:1px solid #bbf7d0}
    .links{text-align:center;margin-top:1rem;font-size:.875rem;color:#64748b}
    .links a{color:#0f766e;font-weight:600;text-decoration:none}
    .hint{background:#f1f5f9;padding:.75rem;border-radius:8px;font-size:.75rem;
          color:#475569;margin-top:1rem;text-align:center}
  </style>
</head>
<body>
  <div class="card">
    <h1>🏆 Get My Coach Uganda</h1>
    <p class="sub">Sign in to continue</p>

    {% with messages = get_flashed_messages(with_categories=true) %}
      {% for category, msg in messages %}
        <div class="alert alert-{{ category }}">{{ msg }}</div>
      {% endfor %}
    {% endwith %}

    <form method="POST" action="{{ url_for('login') }}">
      <label for="login_id">Username or Email</label>
      <input type="text" id="login_id" name="login_id" required autofocus>

      <label for="password">Password</label>
      <input type="password" id="password" name="password" required>

      <button type="submit">Log in</button>
    </form>

    <div class="links">
      New coach? <a href="{{ url_for('signup') }}">Create an account</a>
    </div>

    <div class="hint">
      <strong>Admin:</strong> use username <code>FAROUK</code> + password <code>FAROUK2020</code>
    </div>
  </div>
</body>
</html>
