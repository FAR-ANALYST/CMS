<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Get My Coach Uganda — Login</title>
  <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="min-h-screen bg-gradient-to-br from-emerald-50 via-white to-yellow-50 flex items-center justify-center p-4">
  <div class="w-full max-w-md">
    <div class="text-center mb-6">
      <h1 class="text-3xl font-extrabold text-emerald-700">Get My Coach Uganda</h1>
      <p class="text-gray-600 mt-1">Find verified sports coaches across Uganda</p>
    </div>

    {% with messages = get_flashed_messages(with_categories=true) %}
      {% for cat, msg in messages %}
        <div class="mb-3 p-3 rounded-lg text-sm
          {% if cat == 'error' %}bg-red-100 text-red-700
          {% elif cat == 'success' %}bg-emerald-100 text-emerald-700
          {% else %}bg-yellow-100 text-yellow-800{% endif %}">
          {{ msg }}
        </div>
      {% endfor %}
    {% endwith %}

    <div class="bg-white rounded-2xl shadow-lg p-6">
      <div class="flex gap-2 mb-4">
        <button onclick="showTab('login')" id="tab-login"
          class="flex-1 py-2 rounded-lg font-medium bg-emerald-600 text-white">Log In</button>
        <button onclick="showTab('signup')" id="tab-signup"
          class="flex-1 py-2 rounded-lg font-medium bg-gray-100 text-gray-700">Sign Up</button>
      </div>

      <!-- LOGIN -->
      <form method="post" action="{{ url_for('login') }}" id="form-login" class="space-y-3">
        <div>
          <label class="block text-sm font-medium mb-1">I am a…</label>
          <select name="role" class="w-full border rounded-lg p-2">
            <option value="student">Student / Parent</option>
            <option value="coach">Coach</option>
            <option value="admin">Admin</option>
          </select>
        </div>
        <input type="text" name="email" placeholder="Email or username" required
          class="w-full border rounded-lg p-2" />
        <input type="password" name="password" placeholder="Password" required
          class="w-full border rounded-lg p-2" />
        <button class="w-full bg-emerald-600 hover:bg-emerald-700 text-white font-semibold py-2 rounded-lg">
          Log In
        </button>
        <p class="text-xs text-gray-500 text-center pt-1">
          New here? Click <strong>Sign Up</strong> above to create an account.
        </p>
      </form>

      <!-- SIGNUP -->
      <form method="post" action="{{ url_for('signup') }}" id="form-signup" class="space-y-3 hidden">
        <div>
          <label class="block text-sm font-medium mb-1">I want to register as…</label>
          <select name="role" class="w-full border rounded-lg p-2">
            <option value="student">Student / Parent</option>
            <option value="coach">Coach</option>
          </select>
        </div>
        <input type="text" name="full_name" placeholder="Full name" required
          class="w-full border rounded-lg p-2" />
        <input type="email" name="email" placeholder="Email" required
          class="w-full border rounded-lg p-2" />
        <input type="password" name="password" placeholder="Password (min 6 chars)" required minlength="6"
          class="w-full border rounded-lg p-2" />
        <button class="w-full bg-yellow-500 hover:bg-yellow-600 text-white font-semibold py-2 rounded-lg">
          Create Account
        </button>
      </form>
    </div>

    <p class="text-center text-xs text-gray-500 mt-6">
      © 2025 Get My Coach Uganda
    </p>
  </div>

  <script>
    function showTab(tab) {
      const isLogin = tab === 'login';
      document.getElementById('form-login').classList.toggle('hidden', !isLogin);
      document.getElementById('form-signup').classList.toggle('hidden', isLogin);
      document.getElementById('tab-login').className =
        'flex-1 py-2 rounded-lg font-medium ' + (isLogin ? 'bg-emerald-600 text-white' : 'bg-gray-100 text-gray-700');
      document.getElementById('tab-signup').className =
        'flex-1 py-2 rounded-lg font-medium ' + (!isLogin ? 'bg-emerald-600 text-white' : 'bg-gray-100 text-gray-700');
    }
  </script>
</body>
</html>
