<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login | Get My Coach Uganda</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
</head>
<body class="bg-[#0D0D0D] text-white flex items-center justify-center min-h-screen p-6">
    <div class="w-full max-w-md bg-[#1A1A1A] p-8 rounded-3xl border border-neutral-800 shadow-2xl">
        <div class="text-center mb-8">
            <div class="inline-block p-3 bg-yellow-500 rounded-2xl mb-4">
                <i data-lucide="trophy" class="text-black w-8 h-8"></i>
            </div>
            <h1 class="text-3xl font-bold tracking-tighter uppercase">Get My <span class="text-yellow-500">Coach</span></h1>
            <p class="text-gray-500 text-sm mt-2">Uganda's Premier Sports Network</p>
        </div>

        <form action="/login" method="POST" class="space-y-4">
            <div class="relative">
                <i data-lucide="mail" class="absolute left-4 top-3.5 w-5 h-5 text-gray-500"></i>
                <input type="email" name="email" placeholder="Email Address" required
                    class="w-full bg-black border border-neutral-800 p-3.5 pl-12 rounded-xl focus:border-yellow-500 outline-none transition">
            </div>
            <div class="relative">
                <i data-lucide="lock" class="absolute left-4 top-3.5 w-5 h-5 text-gray-500"></i>
                <input type="password" name="password" placeholder="Password" required
                    class="w-full bg-black border border-neutral-800 p-3.5 pl-12 rounded-xl focus:border-yellow-500 outline-none transition">
            </div>
            <button class="w-full bg-yellow-500 text-black font-bold py-4 rounded-xl hover:bg-yellow-400 transition transform active:scale-95">
                ACCESS PLATFORM
            </button>
        </form>

        <div class="mt-8 pt-6 border-t border-neutral-800 text-center">
            <p class="text-gray-400 text-sm">Are you a Professional Coach?</p>
            <button class="mt-2 text-yellow-500 font-semibold text-sm border-b border-yellow-500/30">Register to Market your Profile</button>
        </div>
    </div>
    <script>lucide.createIcons();</script>
</body>
</html>
