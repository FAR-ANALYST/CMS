{% extends "base.html" %}
{% block title %}Log in · Get My Coach{% endblock %}
{% block content %}
<div class="auth-card">
  <h1>Log in</h1>
  <form method="post" class="form">
    <label>Email
      <input type="email" name="email" required />
    </label>
    <label>Password
      <input type="password" name="password" required />
    </label>
    <button type="submit" class="btn-primary btn-block">Log in</button>
  </form>
  <p class="muted small">Don't have an account? <a href="{{ url_for('signup') }}">Sign up</a></p>
</div>
{% endblock %}
