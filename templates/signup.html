{% extends "base.html" %}
{% block title %}Sign up · Get My Coach Uganda{% endblock %}
{% block content %}
<div class="auth-card">
  <h1>Become a coach</h1>
  <form method="post" class="form-stack">
    <label>Full name<input name="full_name" required></label>
    <label>Email<input type="email" name="email" required></label>
    <label>Password (min 6 chars)<input type="password" name="password" minlength="6" required></label>
    <button class="btn-primary" type="submit">Create account</button>
  </form>
  <p class="muted">Already have an account? <a href="{{ url_for('login') }}">Log in</a></p>
</div>
{% endblock %}
