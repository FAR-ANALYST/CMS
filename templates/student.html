<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <style>body { background-color: #0D0D0D; color: white; }</style>
</head>
<body>
    <nav class="p-6 flex justify-between items-center border-b border-neutral-900 bg-black sticky top-0 z-50">
        <span class="text-xl font-bold uppercase italic">Get My <span class="text-yellow-500">Coach</span></span>
        <div class="flex gap-3">
            <a href="/coach" class="p-2 px-4 bg-neutral-900 border border-neutral-800 rounded-xl text-[10px] font-bold uppercase hover:border-yellow-500 transition">Coach Face</a>
            {% if role == 'admin' %}
            <a href="/admin" class="p-2 px-4 bg-yellow-500 text-black rounded-xl text-[10px] font-black uppercase hover:bg-yellow-400">Admin Face</a>
            {% endif %}
            <a href="/logout" class="p-2 text-red-500 text-[10px] font-bold">LOGOUT</a>
        </div>
    </nav>

    <main class="p-6 max-w-6xl mx-auto">
        <h2 class="text-4xl font-black mb-8 leading-tight">Find an <br><span class="text-yellow-500">Expert Trainer</span></h2>
        
        <div class="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-3 gap-6">
            {% for coach in coaches %}
            <div class="bg-[#1A1A1A] rounded-[2.5rem] p-8 border border-neutral-800 text-center hover:border-yellow-500 transition group shadow-2xl">
                <div class="w-24 h-24 mx-auto rounded-3xl border-4 border-yellow-500/10 mb-4 overflow-hidden bg-black">
                    <img src="{{ coach.profile_pic_url or 'https://ui-avatars.com/api/?background=EAB308&color=000&name=' + coach.username }}" class="w-full h-full object-cover grayscale group-hover:grayscale-0 transition">
                </div>
                <h3 class="font-bold text-xl uppercase tracking-tighter">{{ coach.full_name or coach.username }}</h3>
                <p class="text-yellow-500 text-[10px] font-black tracking-widest">{{ coach.sport_category }}</p>
                <p class="text-neutral-500 text-[10px] mt-2 uppercase font-bold flex justify-center gap-1"><i data-lucide="map-pin" class="w-3 h-3"></i> {{ coach.location_district }}</p>
                <p class="text-neutral-400 text-xs mt-4 line-clamp-2 italic">"{{ coach.bio }}"</p>
                <a href="tel:{{ coach.contact_number }}" class="mt-8 block bg-yellow-500 text-black py-4 rounded-2xl font-black text-xs hover:bg-yellow-400 transition">CONTACT COACH</a>
            </div>
            {% endfor %}
        </div>
    </main>
    <script>lucide.createIcons();</script>
</body>
</html>
