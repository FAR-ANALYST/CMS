<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <style>body { background-color: #0D0D0D; color: white; }</style>
</head>
<body class="p-6">
    <div class="max-w-6xl mx-auto space-y-10">
        <div class="flex justify-between items-center">
            <h1 class="text-3xl font-black italic uppercase tracking-tighter">Get My <span class="text-yellow-500">Coach</span></h1>
            <div class="flex gap-4">
                {% if role == 'admin' %}<a href="/admin" class="bg-yellow-500 text-black px-4 py-2 rounded-xl text-[10px] font-black uppercase">Admin</a>{% endif %}
                <a href="/coach" class="bg-white/10 px-4 py-2 rounded-xl text-[10px] font-black uppercase">My Profile</a>
                <a href="/logout" class="bg-red-500/10 text-red-500 px-4 py-2 rounded-xl text-[10px] font-black uppercase">Logout</a>
            </div>
        </div>

        <form method="GET" action="/student" class="grid grid-cols-1 md:grid-cols-3 gap-4 bg-[#1A1A1A] p-6 rounded-[2rem] border border-neutral-800">
            <div>
                <label class="text-[10px] font-black text-neutral-500 uppercase ml-2 mb-2 block">Sport Category</label>
                <select name="sport" onchange="this.form.submit()" class="w-full bg-black border border-neutral-800 p-4 rounded-xl text-sm focus:border-yellow-500">
                    <option value="">All Sports</option>
                    {% for s in sports %}<option value="{{ s }}" {{'selected' if request.args.get('sport') == s}}>{{ s }}</option>{% endfor %}
                </select>
            </div>
            <div>
                <label class="text-[10px] font-black text-neutral-500 uppercase ml-2 mb-2 block">Location</label>
                <select name="location" onchange="this.form.submit()" class="w-full bg-black border border-neutral-800 p-4 rounded-xl text-sm focus:border-yellow-500">
                    <option value="">All Regions</option>
                    {% for l in locations %}<option value="{{ l }}" {{'selected' if request.args.get('location') == l}}>{{ l }}</option>{% endfor %}
                </select>
            </div>
            <div class="flex items-end">
                <a href="/student" class="text-[10px] font-bold text-neutral-600 uppercase mb-5 ml-4">Reset Filters</a>
            </div>
        </form>

        <div class="grid grid-cols-1 md:grid-cols-3 gap-8">
            {% for coach in coaches %}
            <div class="bg-[#1A1A1A] rounded-[2.5rem] overflow-hidden border border-neutral-800 hover:border-yellow-500/50 transition shadow-2xl">
                <img src="{{ coach.profile_pic_url }}" class="w-full h-64 object-cover">
                <div class="p-8">
                    <span class="text-yellow-500 text-[10px] font-black uppercase tracking-[0.2em]">{{ coach.sport_category }}</span>
                    <h3 class="text-xl font-black mt-1 mb-3">{{ coach.full_name }}</h3>
                    <div class="flex items-center gap-2 text-neutral-500 text-xs mb-6">
                        <i data-lucide="map-pin" class="w-3 h-3"></i> {{ coach.location_district }}
                    </div>
                    <a href="tel:{{ coach.contact_number }}" class="block w-full bg-yellow-500 text-black text-center py-4 rounded-2xl font-black uppercase text-xs">Call Coach</a>
                </div>
            </div>
            {% endfor %}
        </div>
    </div>
    <script>lucide.createIcons();</script>
</body>
</html>
