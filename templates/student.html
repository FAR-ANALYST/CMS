{% extends "base.html" %}
{% block content %}
<style>
    .coach-grid { display: grid; grid-template-columns: repeat(4, 1fr); gap: 20px; }
    @media (max-width: 1024px) { .coach-grid { grid-template-columns: repeat(2, 1fr); } }
    @media (max-width: 600px) { .coach-grid { grid-template-columns: 1fr; } }
</style>

<h1>Top Coaches</h1>
<form method="GET" style="display: flex; gap: 10px; margin-bottom: 30px;">
    <select name="category" style="flex: 1;">
        <option value="">All Sports</option>
        {% for s in SPORTS %}<option value="{{ s }}">{{ s }}</option>{% endfor %}
    </select>
    <input name="location" placeholder="Search Location..." style="flex: 1;">
    <button type="submit" class="btn-primary">Search</button>
</form>

<div class="coach-grid">
    {% for c in coaches %}
    <div class="card">
        <img src="{{ c['image_url'] or '/static/default.jpg' }}" class="avatar">
        <h3>{{ c['full_name'] }}</h3>
        <p style="color: var(--gold); font-size: 0.9rem;">{{ c['category'] }} | {{ c['location'] }}</p>
        <div style="display: flex; gap: 5px; margin-top: 10px;">
            <a href="tel:{{ c['phone'] }}" class="btn-primary" style="flex: 1; text-align: center; font-size: 0.8rem;">CALL</a>
            <button onclick="copyPhone('{{ c['phone'] }}')" class="btn-primary" style="flex: 1; background: transparent; border: 1px solid var(--gold); color: var(--gold); font-size: 0.8rem;">COPY</button>
        </div>
    </div>
    {% endfor %}
</div>

<script>
function copyPhone(num) {
    navigator.clipboard.writeText(num);
    alert("Phone copied: " + num);
}
</script>
{% endblock %}
