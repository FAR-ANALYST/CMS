{% extends "base.html" %}
{% block content %}
<h1>Expert Sports Coaches</h1>
<form method="GET" style="display: grid; grid-template-columns: 1fr 1fr auto; gap: 15px; margin-bottom: 40px;">
    <select name="category">
        <option value="">All Sports</option>
        {% for s in SPORTS %}<option value="{{ s }}">{{ s }}</option>{% endfor %}
    </select>
    <input type="text" name="location" placeholder="Search by City or Location...">
    <button type="submit" class="btn-primary">Filter Coaches</button>
</form>

<div style="display: grid; grid-template-columns: repeat(auto-fill, minmax(300px, 1fr)); gap: 30px;">
    {% for c in coaches %}
    <div class="card">
        {% if c['image_url'] %}
            <img src="{{ c['image_url'] }}" class="avatar">
        {% else %}
            <div class="avatar" style="background:#222; display:flex; align-items:center; justify-content:center; color:var(--gold);">NO IMAGE</div>
        {% endif %}
        <h3>{{ c['full_name'] }}</h3>
        <p style="color: var(--gold); font-weight: bold; margin-bottom: 5px;">{{ c['category'] }} | {{ c['location'] }}</p>
        <p style="font-size: 0.9rem; line-height: 1.5; color: #bbb; height: 4.5em; overflow: hidden;">{{ c['bio'] }}</p>
        <a href="tel:{{ c['phone'] }}" class="btn-primary" style="width: 100%; text-align: center; margin-top: 15px;">Contact Coach</a>
    </div>
    {% endfor %}
</div>
{% endblock %}
