<!DOCTYPE html>
<html lang="en">
<head>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <style>body { background-color: #0D0D0D; color: white; }</style>
</head>
<body class="pb-24">
    <nav class="p-6 flex justify-between items-center border-b border-neutral-900 bg-[#0D0D0D] sticky top-0 z-50">
        <span class="text-xl font-bold uppercase tracking-tighter">Get My <span class="text-yellow-500">Coach</span></span>
        <div class="flex gap-2">
            {% if role == 'admin' %}
            <a href="/admin" class="p-2 bg-yellow-500/10 text-yellow-500 rounded-lg border border-yellow-500/20"><i data-lucide="shield-check" class="w-5 h-5"></i></a>
            {% endif %}
            <a href="/coach" class="p-2 bg-neutral-900 rounded-lg border border-neutral-800"><i data-lucide="user-circle" class="w-5 h-5"></i></a>
        </div>
    </nav>

    <main class="p-6 max-w-6xl mx-auto">
        <h2 class="text-4xl font-black mb-8 leading-tight">Find your <br><span class="text-yellow-500">Expert Trainer</span></h2>

        <div class="grid grid-cols-1 md:grid-cols-2 gap-4 mb-12">
            <select class="bg-[#1A1A1A] p-4 rounded-2xl border border-neutral-800 outline-none text-gray-400">
                <option>All NCS Registered Sports</option>
                <option>Chess</option><option>Football</option><option>Basketball</option>
            </select>
            <select class="bg-[#1A1A1A] p-4 rounded-2xl border border-neutral-800 outline-none text-gray-400">
                <option>Select District (Location)</option>
                <option>Kampala</option><option>Wakiso</option><option>Jinja</option>
            </select>
        </div>

        <div class="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-3 gap-6">
            {% for coach in coaches %}
            <div class="bg-[#1A1A1A] rounded-3xl p-6 border border-neutral-800 flex flex-col items-center text-center">
                <div class="w-24 h-24 rounded-full border-4 border-yellow-500/20 p-1 mb-4">
                    <img src="{{ coach.profile_pic_url or 'https://ui-avatars.com/api/?name=' + coach.username }}" class="w-full h-full rounded-full object-cover">
                </div>
                <h3 class="text-xl font-bold">{{ coach.full_name }}</h3>
                <span class="text-yellow-500 text-xs font-bold uppercase tracking-widest">{{ coach.sport_category }}</span>
                <p class="text-gray-500 text-xs mt-2 flex items-center gap-1"><i data-lucide="map-pin" class="w-3 h-3"></i> {{ coach.location_district }}</p>
                
                <div class="mt-6 w-full flex gap-2">
                    <a href="tel:{{ coach.contact_number }}" class="flex-1 bg-yellow-500 text-black font-bold py-3 rounded-xl flex justify-center items-center gap-2">
                        <i data-lucide="phone" class="w-4 h-4"></i> CALL
                    </a>
                </div>
            </div>
            {% endfor %}
        </div>
    </main>
    <script>lucide.createIcons();</script>
</body>
</html>
