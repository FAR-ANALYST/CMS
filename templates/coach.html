<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <style>body { background-color: #0D0D0D; color: white; }</style>
</head>
<body class="p-6">
    <div class="max-w-xl mx-auto space-y-8">
        <a href="/student" class="text-yellow-500 font-bold text-xs uppercase tracking-widest">← Back to Home</a>
        
        <div class="bg-[#1A1A1A] p-8 rounded-[2.5rem] border border-neutral-800 shadow-2xl">
            <h2 class="text-2xl font-black text-white mb-6 uppercase italic">Submit <span class="text-yellow-500">Profile</span></h2>
            
            <form action="/coach" method="POST" enctype="multipart/form-data" class="space-y-6">
                <div class="text-center">
                    <div class="w-32 h-32 mx-auto rounded-3xl border-4 border-yellow-500/20 overflow-hidden bg-black mb-4">
                        <img id="preview" src="{{ profile.profile_pic_url or 'https://ui-avatars.com/api/?name=Coach' }}" class="w-full h-full object-cover">
                    </div>
                    <label class="bg-neutral-800 px-6 py-2 rounded-xl cursor-pointer text-[10px] font-black uppercase hover:bg-neutral-700 transition">
                        <i data-lucide="camera" class="inline w-3 h-3 mr-2 text-yellow-500"></i> Change Photo
                        <input type="file" name="profile_image" accept="image/*" capture="user" class="hidden" onchange="previewImg(this)">
                    </label>
                    <input type="hidden" name="existing_url" value="{{ profile.profile_pic_url }}">
                </div>

                <div class="space-y-4">
                    <input type="text" name="full_name" value="{{ profile.full_name or '' }}" placeholder="Your Full Name" class="w-full bg-black border border-neutral-800 p-4 rounded-xl outline-none focus:border-yellow-500">
                    <input type="text" name="sport_category" value="{{ profile.sport_category or '' }}" placeholder="Sport (e.g. Football)" class="w-full bg-black border border-neutral-800 p-4 rounded-xl outline-none focus:border-yellow-500">
                    <input type="text" name="contact_number" value="{{ profile.contact_number or '' }}" placeholder="WhatsApp Number" class="w-full bg-black border border-neutral-800 p-4 rounded-xl outline-none focus:border-yellow-500">
                    <textarea name="bio" placeholder="Professional Bio..." class="w-full bg-black border border-neutral-800 p-4 rounded-xl h-24 outline-none focus:border-yellow-500">{{ profile.bio or '' }}</textarea>
                </div>

                <div class="p-4 bg-yellow-500/10 border border-yellow-500/20 rounded-2xl text-center">
                    <p class="text-[10px] text-yellow-500 font-bold uppercase mb-1">Fee: 20,000 UGX</p>
                    <p class="text-[9px] text-neutral-500 uppercase">Send to: 0789268324 (MTN) / 0757307541 (Airtel)</p>
                </div>

                <button class="w-full bg-yellow-500 text-black font-black py-4 rounded-2xl uppercase tracking-widest text-xs">Submit & Pay</button>
            </form>
        </div>
    </div>
    <script>
        function previewImg(input) {
            if (input.files && input.files[0]) {
                var reader = new FileReader();
                reader.onload = function(e) { document.getElementById('preview').src = e.target.result; }
                reader.readAsDataURL(input.files[0]);
            }
        }
        lucide.createIcons();
    </script>
</body>
</html>
