{% extends "base.html" %}
{% block content %}
<h1>Coach Settings</h1>

<section class="panel">
    <form method="POST" action="{{ url_for('coach_submit') }}" enctype="multipart/form-data">
        <div style="display: grid; grid-template-columns: 1fr 1fr; gap: 20px;">
            <div>
                <label>Name</label>
                <input name="full_name" value="{{ submissions[0]['full_name'] if submissions else '' }}" required>
                <label>Sport</label>
                <select name="category">
                    {% for s in SPORTS %}
                    <option value="{{ s }}" {% if submissions and submissions[0]['category'] == s %}selected{% endif %}>{{ s }}</option>
                    {% endfor %}
                </select>
            </div>
            <div>
                <label>Location</label>
                <input name="location" value="{{ submissions[0]['location'] if submissions else '' }}">
                <label>Profile Picture</label>
                <input type="file" name="image" accept="image/*">
                <input type="hidden" name="existing_image" value="{{ submissions[0]['image_url'] if submissions else '' }}">
            </div>
        </div>
        <label>Bio</label>
        <textarea name="bio" rows="4">{{ submissions[0]['bio'] if submissions else '' }}</textarea>
        <button type="submit" class="btn-primary" style="width: 100%; margin-top: 15px;">Update & Submit to Farouk</button>
    </form>
</section>

<div class="panel" style="margin-top: 20px; border-left: 5px solid {% if submissions and submissions[0]['is_verified'] == 1 %}#34d399{% else %}var(--gold){% endif %};">
    <p>Status: <strong>{% if submissions and submissions[0]['is_verified'] == 1 %}LIVE{% else %}PENDING APPROVAL{% endif %}</strong></p>
</div>
{% endblock %}
