{% extends "base.html" %}
{% block title %}Sign in · Get My Coach{% endblock %}
{% block content %}
<div class="auth-grid">
  <section class="card">
    <h2>Sign in</h2>
    <p class="muted">Tip: admin shortcut is <code>FAROUK</code> / <code>FAROUK2020</code></p>
    <form method="post" class="stack">
      <input type="hidden" name="mode" value="login" />
      <label>Email <input name="email" required /></label>
      <label>Password <input type="password" name="password" required /></label>
      <button class="btn-primary" type="submit">Sign in</button>
    </form>
  </section>

  <section class="card">
    <h2>Create account</h2>
    <form method="post" class="stack">
      <input type="hidden" name="mode" value="signup" />
      <label>Full name <input name="full_name" required /></label>
      <label>Email <input type="email" name="email" required /></label>
      <label>Password <input type="password" name="password" minlength="6" required /></label>
      <label>I am a…
        <select name="role" required>
          <option value="student">Student looking for a coach</option>
          <option value="coach">Coach offering services</option>
        </select>
      </label>
      <button class="btn-primary" type="submit">Create account</button>
    </form>
  </section>
</div>
{% endblock %}
